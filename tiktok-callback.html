<!DOCTYPE html>
<html>
<head><title>Connecting TikTok...</title>
<style>body{font-family:Arial;text-align:center;padding:60px;background:#080c14;color:#00f5ff;}</style>
</head>
<body>
<h2>⚡ Connecting TikTok to LuckyLefty Empire...</h2>
<p id="status">Transferring authorization...</p>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const state = params.get('state');
if (code) {
  document.getElementById('status').textContent = 'Got code! Redirecting to dashboard...';
  // Redirect to localhost with the code
  window.location.href = 'http://localhost:3001/tiktok/callback?code=' + code + '&state=' + (state||'');
} else {
  document.getElementById('status').textContent = 'Error: ' + (params.get('error') || 'No code received');
}
</script>
</body>
</html>
